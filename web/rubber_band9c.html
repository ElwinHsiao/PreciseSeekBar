<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>橡皮筋轨道联动 - 最终精确修复版</title>
    <style>
        :root {
            --bg-color: #1a1a1a; --panel-color: #222;
            --accent-color: #00ff88; --rubber-color: #ff4757;
            --ring-color: #00d2ff;
        }
        body { margin: 0; background: var(--bg-color); overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #eee; font-family: sans-serif; }
        .phone-panel {
            position: relative; height: 95vh; aspect-ratio: 9 / 16;
            background: var(--panel-color); border-radius: 24px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9); border: 2px solid #333; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
    </style>
</head>
<body>
    <div class="phone-panel">
        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const circle_scale = 0.1
    const k_rubber = 0.6, damp_rubber = 0.3;
    const k_ghost = 0.7, damp_ghost = 0.2;
    const bottomMargin = 50, sideMargin = 35, ringRadius = 65, triggerDist = 200;
    const indictorOffset = 40;

    let leftA, rightA, ringCenter;
    let isDragging = false;
    let mode = "RUBBER"; 
    let smallRatio = 0.5, lastAngle = 0, totalRadian = 0;
    let solidP = {x:0, y:0, vx:0, vy:0}, ghostP = {x:0, y:0, vx:0, vy:0};

    function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        leftA = {x: sideMargin, y: canvas.height - bottomMargin};
        rightA = {x: canvas.width - sideMargin, y: canvas.height - bottomMargin};
        ringCenter = {x: canvas.width / 2, y: leftA.y - triggerDist};
        if(!isDragging) {
            const startX = leftA.x + (rightA.x - leftA.x) * smallRatio;
            solidP.x = ghostP.x = startX; solidP.y = ghostP.y = leftA.y;
        }
    }
    window.addEventListener('resize', resize);
    resize();

    canvas.addEventListener('mousedown', (e) => { isDragging = true; handleInput(e); });
    window.addEventListener('mousemove', (e) => { if (isDragging) handleInput(e); });
    window.addEventListener('mouseup', () => { 
        isDragging = false; mode = "RUBBER"; 
        console.log("progress=", Math.round(smallRatio * 10000));
    });

    function handleInput(e) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;

        if (mode === "RUBBER") {
            ghostP.x = mx; ghostP.y = my;
            // const dL = Math.hypot(mx - leftA.x, my - leftA.y);
            // const dR = Math.hypot(mx - rightA.x, my - rightA.y);
            // smallRatio = dL / (dL + dR);
            smallRatio = Math.max(0, Math.min((ghostP.x - leftA.x) / (rightA.x - leftA.x), 1))
            if (my <= ringCenter.y + ringRadius + indictorOffset) {
                mode = "RING"; totalRadian = 0;
                lastAngle = Math.atan2(my - ringCenter.y, mx - ringCenter.x);
            }
        } else {
            const dx = mx - ringCenter.x, dy = my - ringCenter.y;
            const currentAngle = Math.atan2(dy, dx);
            ghostP.x = ringCenter.x + Math.cos(currentAngle) * ringRadius;
            ghostP.y = ringCenter.y + Math.sin(currentAngle) * ringRadius;
            let delta = currentAngle - lastAngle;
            if (delta > Math.PI) delta -= Math.PI * 2;
            if (delta < -Math.PI) delta += Math.PI * 2;
            
            let radioDelta = (delta / (Math.PI * 2)) * circle_scale
            totalRadian += radioDelta;
            smallRatio += radioDelta
            if (smallRatio > 1) {
                totalRadian -= smallRatio - 1
                smallRatio = 1
            } else if (smallRatio < 0) {
                totalRadian -= smallRatio
                smallRatio = 0
            }
            lastAngle = currentAngle;
        }
    }

    function drawStepIcon(x, y, isForward, alpha) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = `rgba(0, 210, 255, ${alpha})`;
        const dir = isForward ? 1 : -1;
        for(let i=0; i<2; i++){
            ctx.beginPath();
            ctx.moveTo(i * 7 * dir, -5);
            ctx.lineTo((i * 7 + 8) * dir, 0);
            ctx.lineTo(i * 7 * dir, 5);
            ctx.fill();
        }
        ctx.restore();
    }

    // 绘制指示箭头：左边外撇，右边外撇
    function drawSideArrows(alpha) {
        ctx.save();
        ctx.strokeStyle = `rgba(0, 210, 255, ${alpha})`;
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";
        const outerR = ringRadius + 22; 

        // --- 左侧部分 ---
        const leftStart = Math.PI * 1.15;
        const leftEnd = Math.PI * 0.85;
        ctx.beginPath();
        ctx.arc(ringCenter.x, ringCenter.y, outerR, leftStart, leftEnd, true); // 逆时针画
        ctx.stroke();
        
        // 左侧短撇 (从弧线终点向左外侧撇)
        const lx = ringCenter.x + Math.cos(leftEnd) * outerR;
        const ly = ringCenter.y + Math.sin(leftEnd) * outerR;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        // 数学计算：向左下方偏转
        ctx.lineTo(lx - 8, ly -3); 
        ctx.stroke();

        // --- 右侧部分 ---
        const rightStart = -Math.PI * 0.15;
        const rightEnd = Math.PI * 0.15;
        ctx.beginPath();
        ctx.arc(ringCenter.x, ringCenter.y, outerR, rightStart, rightEnd, false); // 顺时针画
        ctx.stroke();
        
        // 右侧短撇 (从弧线终点向右外侧撇)
        const rx = ringCenter.x + Math.cos(rightEnd) * outerR;
        const ry = ringCenter.y + Math.sin(rightEnd) * outerR;
        ctx.beginPath();
        ctx.moveTo(rx, ry);
        // 数学计算：向右下方偏转
        ctx.lineTo(rx + 8, ry - 3); 
        ctx.stroke();
        
        ctx.restore();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const targetSX = leftA.x + (rightA.x - leftA.x) * smallRatio, targetSY = leftA.y;

        if (!isDragging) {
            solidP.vx = (solidP.vx + (targetSX - solidP.x) * k_rubber) * damp_rubber;
            solidP.vy = (solidP.vy + (targetSY - solidP.y) * k_rubber) * damp_rubber;
        } else if (mode === "RING") {
            solidP.x = targetSX; solidP.y = ringCenter.y + ringRadius + indictorOffset;; 
        } else {
            solidP.x = ghostP.x; solidP.y = ghostP.y; 
        }
        solidP.x += solidP.vx; solidP.y += solidP.vy;

        if (!isDragging) {
            ghostP.vx = (ghostP.vx + (solidP.x - ghostP.x) * k_ghost) * damp_ghost;
            ghostP.vy = (ghostP.vy + (solidP.y - ghostP.y) * k_ghost) * damp_ghost;
            ghostP.x += ghostP.vx; ghostP.y += ghostP.vy;
        }

        if (isDragging) {
            let distance = leftA.y - (ringCenter.y + ringRadius)
            let moveY = leftA.y - ghostP.y
            let alpha = (mode === "RING") ? 1 : Math.max(0, Math.min(moveY / distance, 1));
            if (alpha > 0) {
                ctx.strokeStyle = `rgba(0, 210, 255, ${alpha})`;
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(ringCenter.x, ringCenter.y, ringRadius, 0, Math.PI*2); ctx.stroke();
                
                if (mode === "RING") {
                    const val = Math.round(totalRadian * 10000);
                    const sign = val > 0 ? "+" : "";
                    ctx.fillStyle = `rgba(0, 210, 255, ${alpha})`;
                    ctx.font = "bold 28px sans-serif";
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText((val === 0 ? "0" : sign + val), ringCenter.x, ringCenter.y);

                    drawSideArrows(alpha);
                    drawStepIcon(ringCenter.x - ringRadius - 40, ringCenter.y, false, alpha);
                    drawStepIcon(ringCenter.x + ringRadius + 40, ringCenter.y, true, alpha);
                }

                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`; ctx.setLineDash([10, 5]); ctx.lineWidth = 1;
                let indictorY = ringCenter.y + ringRadius + indictorOffset;
                ctx.beginPath(); ctx.moveTo(leftA.x, indictorY); ctx.lineTo(rightA.x, indictorY); ctx.stroke();
                ctx.setLineDash([]);

            }
        }

        ctx.fillStyle = "#fff"; ctx.strokeStyle = "#fff";
        ctx.beginPath(); ctx.moveTo(leftA.x, leftA.y); ctx.lineTo(solidP.x, solidP.y); ctx.lineTo(rightA.x, rightA.y);
        ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.stroke();

        ctx.beginPath(); ctx.arc(solidP.x, solidP.y, 6, 0, Math.PI*2); ctx.fill();
        if (isDragging) {
            ctx.fillStyle = "#fff"; ctx.font = "bold 13px monospace"; ctx.textAlign = "center";
            ctx.fillText(Math.round(smallRatio * 10000), solidP.x, solidP.y - 18);
        }

        const distToMerge = Math.hypot(ghostP.x - solidP.x, ghostP.y - solidP.y);
        const distToCircle = Math.hypot(ghostP.x - ringCenter.x, ghostP.y - ringCenter.y);
        alpha = isDragging ? 1 : distToMerge / distToCircle
        alpha *= 0.8
        if (isDragging || distToMerge > 0.5) {
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(ghostP.x, ghostP.y, 11, 0, Math.PI*2); ctx.stroke();
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
